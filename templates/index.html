<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Welcome to Duscraft</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .gear {
      animation: rotate 3s linear infinite;
      transform-origin: 50% 50%;
    }
    .gear.reverse {
      animation-direction: reverse;
    }
    @keyframes rotate {
      100% { transform: rotate(360deg);}
    }
  </style>
</head>
<body class="bg-gradient-to-b from-indigo-900 via-purple-900 to-gray-900 min-h-screen flex flex-col justify-between">
  <main class="flex flex-col items-center justify-center flex-1 px-4">
    <h1 class="text-5xl md:text-7xl font-extrabold text-white mt-16 mb-4 drop-shadow-lg">Welcome to Duscraft</h1>
    <h2 class="text-2xl md:text-3xl text-indigo-200 mb-16 font-medium">Crafting software beyond sunset</h2>
    <section class="w-full flex flex-col items-center my-12">
      <div class="flex justify-center items-center w-full mb-6">
        <svg class="gear w-16 h-16 text-indigo-400 mx-4" fill="none" viewBox="0 0 64 64">
          <circle cx="32" cy="32" r="28" stroke="currentColor" stroke-width="4"/>
          <path d="M32 8v8M32 48v8M8 32h8M48 32h8M16.97 16.97l5.66 5.66M41.37 41.37l5.66 5.66M16.97 47.03l5.66-5.66M41.37 22.63l5.66-5.66" stroke="currentColor" stroke-width="4"/>
        </svg>
        <svg class="gear reverse w-12 h-12 text-purple-400 mx-4" fill="none" viewBox="0 0 48 48">
          <circle cx="24" cy="24" r="20" stroke="currentColor" stroke-width="3"/>
          <path d="M24 4v6M24 38v6M4 24h6M38 24h6M10.93 10.93l4 4M33.07 33.07l4 4M10.93 37.07l4-4M33.07 14.93l4-4" stroke="currentColor" stroke-width="3"/>
        </svg>
        <svg class="gear w-10 h-10 text-indigo-300 mx-4" fill="none" viewBox="0 0 40 40">
          <circle cx="20" cy="20" r="16" stroke="currentColor" stroke-width="2"/>
          <path d="M20 4v4M20 32v4M4 20h4M32 20h4M8.93 8.93l2.83 2.83M28.24 28.24l2.83 2.83M8.93 31.07l2.83-2.83M28.24 11.76l2.83-2.83" stroke="currentColor" stroke-width="2"/>
        </svg>
      </div>
      <div class="w-full text-center">
        <span class="text-xl md:text-2xl text-indigo-100 font-semibold tracking-wide animate-pulse">
          Work in progress, please come back later
        </span>
      </div>
    </section>
  </main>
  <footer class="w-full text-center py-6 bg-gray-900 text-indigo-200 text-sm">
    &copy; 2025 Author. All Rights Reserved. from Duscraft
  </footer>
</body>
</html>
